# Gemini CLI policy pack - the second agent, proving the model is agent-neutral.
# OBSERVED by running the CLI in a container (v0.49.0): command `gemini`, `-p/--prompt`
# is non-interactive/headless, and with no auth it asks to set GEMINI_API_KEY /
# GOOGLE_GENAI_USE_VERTEXAI / GOOGLE_GENAI_USE_GCA and points at ~/.gemini/settings.json.
# The egress domains below are INFERRED from Google's documented endpoints, not yet
# captured through the proxy with a real key - tighten them from a real ALLOW/DENY
# trace when one is available.
# This file is DATA, not code (criterion P4): no executable hooks.
agent: gemini-cli
scope: local
type: cli-headless

run:
  image: runclave/gemini-cli:latest
  command: gemini
  # --yolo: auto-approve tool actions. Safe here because the BOX is the boundary
  # (same rationale as disabling the agent's own sandbox below); -p is headless.
  headlessFlags: ["--yolo", "-p"]
  shell: bash # the gemini-cli image (node:20-bookworm-slim) ships bash

egress:
  # model/auth endpoints - allow (criterion E7)
  model:
    - generativelanguage.googleapis.com # Gemini API, the GEMINI_API_KEY path
    - cloudcode-pa.googleapis.com        # Code Assist, the Google-login (GCA) path
  # infra the agent legitimately needs. oauth2.googleapis.com is token REFRESH for the
  # login path (interactive consent at accounts.google.com can't happen in a headless
  # box, so it is deliberately NOT allowed). github.com lets brokered `git push` reach
  # the origin - without it the broker mints a token the proxy would then deny.
  infra:
    - oauth2.googleapis.com
    - github.com

auth:
  # API-key via env is the cleanest bridge; a Google login under ~/.gemini is the
  # opt-in --login alternative.
  method: env-token
  envVar: GEMINI_API_KEY
  deviceFlow: false
  # Opt-in only (runclave . --login): mounts all of ~/.gemini read-only. That is more
  # than the login - it also exposes settings.json (which is the MCP config below, and
  # can hold third-party MCP secrets) and local chat history to the box. Sharing hands
  # the box a long-lived credential; a scoped GEMINI_API_KEY via envVar is preferred.
  loginPaths:
    - "~/.gemini"

paths:
  # Deny-read hotspot (criterion S5): the OAuth creds file, on top of absence.
  credentialHotspots:
    - "~/.gemini/oauth_creds.json"

mcp:
  configPath: "~/.gemini/settings.json"
  # Never auto-trust a repo-provided MCP config (criterion P5).
  consentPolicy: outside-repo

nativeSandbox:
  # Gemini CLI has its own --sandbox (GEMINI_SANDBOX), but inside our box WE own
  # isolation. Disable it to avoid nested-sandbox failure modes; the box is the
  # boundary.
  mode: disable
  disableFlag: ""
